AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >-
  Archon Memory Control Room: private S3 SPA behind CloudFront OAC, with a
  same-origin HTTP API backed by Lambda, Bedrock, and CockroachDB Cloud.

Parameters:
  AppName:
    Type: String
    Default: archon-memory
    AllowedPattern: "^[a-z][a-z0-9-]{2,24}$"
    Description: Lowercase application identifier used in resource names.
  Environment:
    Type: String
    AllowedValues:
      - staging
      - production
    Default: staging
  DatabaseSecretId:
    Type: String
    AllowedPattern: "^[A-Za-z0-9/_+=.@-]+$"
    Description: >-
      Deterministic name of a Secrets Manager secret whose JSON contains
      DATABASE_URL. The
      connection string is never passed as a CloudFormation parameter or
      Lambda environment variable.
  LambdaExecutionRoleArn:
    Type: String
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):iam::[0-9]{12}:role/.+$"
    Description: Bootstrap-owned environment-specific Lambda runtime role.
  CodeDeployServiceRoleArn:
    Type: String
    AllowedPattern: "^arn:(aws|aws-us-gov|aws-cn):iam::[0-9]{12}:role/.+$"
    Description: Bootstrap-owned environment-specific CodeDeploy service role.
  BedrockRegion:
    Type: String
    Default: eu-west-1
    AllowedValues:
      - eu-west-1
  BedrockEmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
    AllowedValues:
      - amazon.titan-embed-text-v2:0
  BedrockNarratorModelId:
    Type: String
    Default: eu.anthropic.claude-sonnet-4-6
    AllowedValues:
      - eu.anthropic.claude-sonnet-4-6
  CockroachRegion:
    Type: String
    Default: eu-west-1
    AllowedValues:
      - eu-west-1
    Description: Region independently verified by the protected Cockroach Cloud API release gate.
  CockroachRegionEvidence:
    Type: String
    Default: cockroach-cloud-api-release-gate
    AllowedValues:
      - cockroach-cloud-api-release-gate
  PublicDemoTenantId:
    Type: String
    Default: public-demo
    AllowedValues:
      - public-demo
  PublicDemoCompany:
    Type: String
    Default: Helios SA
    AllowedValues:
      - Helios SA
  LambdaMemoryMb:
    Type: Number
    Default: 512
    MinValue: 256
    MaxValue: 3008
  ReservedConcurrency:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 20
  ApiThrottleRate:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 100
  ApiThrottleBurst:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 200
  AlarmTopicArn:
    Type: String
    Default: ""
    Description: Optional SNS topic ARN for operational alarm notifications.

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, ""]]

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Timeout: 30
    MemorySize: !Ref LambdaMemoryMb
    Tracing: Active
    Tags:
      Application: !Ref AppName
      Environment: !Ref Environment
      ManagedBy: SAM

Resources:
  SpaBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AppName}-${Environment}-web-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: RemoveOldNoncurrentVersions
            Status: Enabled
            Prefix: ""
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
              NewerNoncurrentVersions: 3
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub "${AppName}-${Environment} private SPA origin"
        Name: !Sub "${AppName}-${Environment}-spa-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AppName}-${Environment}-security-headers"
        Comment: Browser security policy for the public judge application
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            ContentSecurityPolicy: >-
              default-src 'self'; base-uri 'self'; connect-src 'self';
              font-src 'self' data:; form-action 'self'; frame-ancestors 'none';
              img-src 'self' data:; object-src 'none'; script-src 'self';
              style-src 'self' 'unsafe-inline'; upgrade-insecure-requests
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true
          XSSProtection:
            Protection: true
            ModeBlock: true
            Override: true
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: "camera=(), geolocation=(), microphone=(), payment=(), usb=()"
              Override: true
            - Header: X-Robots-Tag
              Value: "noindex, nofollow"
              Override: true

  SpaRouteRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AppName}-${Environment}-spa-route-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite extensionless SPA routes to index.html
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
          } else if (uri.indexOf('.') === -1) {
            request.uri = '/index.html';
          }
          return request;
        }

  ApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AppName}-${Environment}"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  ServerlessHttpApi:
    Type: AWS::Serverless::HttpApi
    DependsOn:
      - ApiAccessLogGroup
    Properties:
      Description: Public read-only judge API for Archon Memory
      StageName: "$default"
      FailOnWarnings: true
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: !Ref ApiThrottleBurst
        ThrottlingRateLimit: !Ref ApiThrottleRate
      AccessLogSettings:
        DestinationArn: !GetAtt ApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","responseLatency":"$context.responseLatency","integrationError":"$context.integrationErrorMessage"}
      Tags:
        Application: !Ref AppName
        Environment: !Ref Environment
        ManagedBy: SAM

  ArchonFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - ArchonFunctionLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-${Environment}-api"
      Description: Fixed-scope read-only memory recall, audit, and proof API
      CodeUri: ../
      Handler: lambda.handler
      Role: !Ref LambdaExecutionRoleArn
      ReservedConcurrentExecutions: !Ref ReservedConcurrency
      AutoPublishAlias: live
      DeploymentPreference:
        Enabled: true
        Type: Canary10Percent5Minutes
        Role: !Ref CodeDeployServiceRoleArn
        Alarms:
          - !Ref LambdaErrorAlarm
      Environment:
        Variables:
          DATABASE_SECRET_ID: !Ref DatabaseSecretId
          BEDROCK_REGION: !Ref BedrockRegion
          BEDROCK_EMBED_MODEL_ID: !Ref BedrockEmbeddingModelId
          BEDROCK_MODEL_ID: !Ref BedrockNarratorModelId
          PUBLIC_DEMO_TENANT_ID: !Ref PublicDemoTenantId
          PUBLIC_DEMO_COMPANY: !Ref PublicDemoCompany
          COCKROACH_REGION: !Ref CockroachRegion
          COCKROACH_REGION_EVIDENCE: !Ref CockroachRegionEvidence
          PGPOOL_MAX: "1"
          PGPOOL_MAX_LIFETIME_SECONDS: "300"
          RECALL_MAX_QUESTION_CHARS: "500"
          RECALL_MIN_SCORE: "0.15"
          NODE_OPTIONS: "--enable-source-maps"
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /api/health
            Method: GET
        RecallPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /api/recall
            Method: POST
        Audit:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /api/audit
            Method: GET
        Proof:
          Type: HttpApi
          Properties:
            ApiId: !Ref ServerlessHttpApi
            Path: /api/proof
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/lambda.ts
        External:
          - pg-native
          - "@aws-sdk/signature-v4-crt"
        Format: cjs
        Minify: true
        Sourcemap: true
        Target: node22

  ArchonFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${Environment}-api"
      RetentionInDays: 30
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${AppName}-${Environment} same-origin web application"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_100
        DefaultRootObject: index.html
        Origins:
          - Id: SpaOrigin
            DomainName: !GetAtt SpaBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOriginAccessControl.Id
            S3OriginConfig: {}
          - Id: ApiOrigin
            DomainName: !Sub "${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: SpaOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRouteRewriteFunction.FunctionARN
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - PATCH
              - POST
              - DELETE
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            Compress: true
            ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  SpaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SpaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt SpaBucket.Arn
              - !Sub "${SpaBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
            Resource: !Sub "${SpaBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-lambda-errors"
      AlarmDescription: Lambda errors detected in the public judge API
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ArchonFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - - !Ref AlarmTopicArn
        - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-lambda-throttles"
      AlarmDescription: Reserved-concurrency or account-level throttles detected
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ArchonFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - - !Ref AlarmTopicArn
        - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  ApiServerErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-${Environment}-api-5xx"
      AlarmDescription: HTTP API 5xx responses detected
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref ServerlessHttpApi
        - Name: Stage
          Value: "$default"
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasAlarmTopic
        - - !Ref AlarmTopicArn
        - !Ref AWS::NoValue
      Tags:
        - Key: Application
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${AppName}-${Environment}-operations"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "Lambda health",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${ArchonFunction}"],
                  [".", "Errors", ".", "."],
                  [".", "Throttles", ".", "."],
                  [".", "Duration", ".", ".", {"stat": "p95"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "title": "HTTP API",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "metrics": [
                  ["AWS/ApiGateway", "Count", "ApiId", "${ServerlessHttpApi}", "Stage", "$default"],
                  [".", "4xx", ".", ".", ".", "."],
                  [".", "5xx", ".", ".", ".", "."],
                  [".", "Latency", ".", ".", ".", ".", {"stat": "p95"}]
                ]
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 24,
              "height": 5,
              "properties": {
                "title": "CloudFront delivery",
                "region": "us-east-1",
                "view": "timeSeries",
                "metrics": [
                  ["AWS/CloudFront", "Requests", "DistributionId", "${Distribution}", "Region", "Global"],
                  [".", "4xxErrorRate", ".", ".", ".", ".", {"stat": "Average"}],
                  [".", "5xxErrorRate", ".", ".", ".", ".", {"stat": "Average"}]
                ]
              }
            }
          ]
        }

Outputs:
  ApplicationUrl:
    Description: Public same-origin judge application
    Value: !Sub "https://${Distribution.DomainName}"
  DistributionId:
    Description: CloudFront distribution used for frontend deployment/invalidation
    Value: !Ref Distribution
  SpaBucketName:
    Description: Private frontend deployment bucket
    Value: !Ref SpaBucket
  ApiEndpoint:
    Description: Direct HTTP API endpoint (CloudFront /api/* is preferred)
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"
  FunctionName:
    Description: Lambda function name
    Value: !Ref ArchonFunction
  DashboardName:
    Description: CloudWatch operations dashboard
    Value: !Ref OperationsDashboard
