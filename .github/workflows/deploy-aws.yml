name: Deploy AWS

# Third-party actions and runtime inputs are immutable. The deployment checks
# out only the exact successful CI SHA at the current main head, builds once,
# verifies the receipt in every environment, then promotes that same candidate.

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: aws-production-delivery
  cancel-in-progress: false

permissions:
  contents: read

env:
  APP_NAME: ${{ vars.AWS_APP_NAME || 'archon-memory' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  BEDROCK_REGION: ${{ vars.BEDROCK_REGION || 'eu-west-1' }}
  BEDROCK_EMBED_MODEL_ID: ${{ vars.BEDROCK_EMBED_MODEL_ID || 'amazon.titan-embed-text-v2:0' }}
  BEDROCK_NARRATOR_MODEL_ID: ${{ vars.BEDROCK_NARRATOR_MODEL_ID || 'eu.anthropic.claude-sonnet-4-6' }}

jobs:
  build-once:
    name: Verify CI SHA and build once
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out the exact successful CI commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Prove the CI SHA is still the main branch head
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          MAIN_SHA="$(git rev-parse origin/main)"
          test "$EXPECTED_SHA" = "$MAIN_SHA"
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.164.0

      - name: Install pinned CloudFormation linter
        run: python -m pip install --disable-pip-version-check cfn-lint==1.53.1

      - name: Install backend and frontend dependencies
        run: |
          set -euo pipefail
          npm ci
          npm ci --prefix web

      - name: Test and build the frontend
        run: |
          set -euo pipefail
          npm test --prefix web
          npm run build --prefix web

      - name: Validate and build the SAM application
        run: |
          set -euo pipefail
          cfn-lint aws/bootstrap-oidc.yaml
          sam validate --lint --template-file aws/template.yaml --region "$AWS_REGION"
          PATH="$PWD/node_modules/.bin:$PATH" sam build \
            --template-file aws/template.yaml \
            --build-dir .aws-sam/build \
            --cached \
            --parallel
          if grep -q "Type: AWS::IAM::" .aws-sam/build/template.yaml; then
            echo "Application stack must not synthesize IAM resources." >&2
            exit 1
          fi

      - name: Create sanitized build receipt
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          node aws/create-deployment-receipt.mjs \
            --commit "$COMMIT_SHA" \
            --sam .aws-sam/build \
            --web web/dist > deployment-receipt.json
          jq -e \
            '.schemaVersion == 1 and
             .commitSha == env.COMMIT_SHA and
             .provenance.buildOncePromoteSameArtifact == true' \
            deployment-receipt.json

      - name: Upload immutable candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aws-candidate-${{ github.event.workflow_run.head_sha }}
          path: |
            .aws-sam/build/
            web/dist/
            deployment-receipt.json
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 14

  database-release:
    name: Reconcile CockroachDB memory release
    needs:
      - build-once
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/database-release.yml
    with:
      target_sha: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit

  deploy-staging:
    name: Deploy and smoke staging
    needs:
      - build-once
      - database-release
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.stack.outputs.application_url }}
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 45
    env:
      STACK_NAME: ${{ vars.AWS_STACK_NAME || 'archon-memory-staging' }}
      DATABASE_SECRET_ID: ${{ vars.DATABASE_SECRET_ID || 'archon-memory/staging/database' }}
      ALARM_TOPIC_ARN: ${{ secrets.ALARM_TOPIC_ARN }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN: ${{ vars.AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN }}
      AWS_SAM_ARTIFACT_BUCKET: ${{ vars.AWS_SAM_ARTIFACT_BUCKET }}
      AWS_LAMBDA_EXECUTION_ROLE_ARN: ${{ vars.AWS_LAMBDA_EXECUTION_ROLE_ARN }}
      AWS_CODEDEPLOY_SERVICE_ROLE_ARN: ${{ vars.AWS_CODEDEPLOY_SERVICE_ROLE_ARN }}
    steps:
      - name: Check out the exact promoted source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Download the CI-proven candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-candidate-${{ github.event.workflow_run.head_sha }}

      - name: Verify candidate tree hashes and eu-west-1 boundary
        run: |
          set -euo pipefail
          test "$AWS_REGION" = "eu-west-1"
          test "$BEDROCK_REGION" = "eu-west-1"
          test -n "$AWS_ACCOUNT_ID"
          node aws/create-deployment-receipt.mjs \
            --verify deployment-receipt.json \
            --commit "${{ github.event.workflow_run.head_sha }}" \
            --sam .aws-sam/build \
            --web web/dist

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.164.0

      - name: Configure short-lived AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: archon-staging-${{ github.run_id }}
          mask-aws-account-id: true
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Capture the current recoverable release
        id: previous
        run: |
          set -euo pipefail
          FUNCTION_NAME=""
          FUNCTION_VERSION=""
          APPLICATION_URL=""
          if aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            FUNCTION_NAME="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue | [0]" \
              --output text)"
            APPLICATION_URL="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='ApplicationUrl'].OutputValue | [0]" \
              --output text)"
            if [ -n "$FUNCTION_NAME" ] && [ "$FUNCTION_NAME" != "None" ]; then
              FUNCTION_VERSION="$(aws lambda get-alias \
                --function-name "$FUNCTION_NAME" \
                --name live \
                --region "$AWS_REGION" \
                --query FunctionVersion \
                --output text 2>/dev/null || true)"
            fi
          fi
          {
            echo "function_name=$FUNCTION_NAME"
            echo "function_version=$FUNCTION_VERSION"
            echo "application_url=$APPLICATION_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy the staging stack
        id: deploy
        env:
          CANARY_URL: ${{ steps.previous.outputs.application_url }}
        run: |
          set -euo pipefail
          test -n "$DATABASE_SECRET_ID"
          test -n "$AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN"
          test -n "$AWS_SAM_ARTIFACT_BUCKET"
          test -n "$AWS_LAMBDA_EXECUTION_ROLE_ARN"
          test -n "$AWS_CODEDEPLOY_SERVICE_ROLE_ARN"
          PARAMETERS=(
            "AppName=$APP_NAME"
            "Environment=staging"
            "DatabaseSecretId=$DATABASE_SECRET_ID"
            "LambdaExecutionRoleArn=$AWS_LAMBDA_EXECUTION_ROLE_ARN"
            "CodeDeployServiceRoleArn=$AWS_CODEDEPLOY_SERVICE_ROLE_ARN"
            "BedrockRegion=$BEDROCK_REGION"
            "BedrockEmbeddingModelId=$BEDROCK_EMBED_MODEL_ID"
            "BedrockNarratorModelId=$BEDROCK_NARRATOR_MODEL_ID"
            "CockroachRegion=eu-west-1"
            "CockroachRegionEvidence=cockroach-cloud-api-release-gate"
          )
          if [ -n "$ALARM_TOPIC_ARN" ]; then
            PARAMETERS+=("AlarmTopicArn=$ALARM_TOPIC_ARN")
          fi
          CANARY_PROBE_PID=""
          stop_canary_probe() {
            if [ -n "$CANARY_PROBE_PID" ]; then
              kill "$CANARY_PROBE_PID" 2>/dev/null || true
              wait "$CANARY_PROBE_PID" 2>/dev/null || true
            fi
          }
          trap stop_canary_probe EXIT
          if [ -n "$CANARY_URL" ] && [ "$CANARY_URL" != "None" ]; then
            (
              for attempt in $(seq 1 180); do
                curl --fail --silent --max-time 30 \
                  "$CANARY_URL/api/proof" >/dev/null 2>&1 || true
                if [ $((attempt % 5)) -eq 0 ]; then
                  curl --fail --silent --max-time 45 \
                    -X POST "$CANARY_URL/api/recall" \
                    -H 'content-type: application/json' \
                    --data '{"question":"What was the true employer cost and the off-bank wedge?","limit":5}' \
                    >/dev/null 2>&1 || true
                fi
                sleep 2
              done
            ) &
            CANARY_PROBE_PID=$!
          fi
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --s3-bucket "$AWS_SAM_ARTIFACT_BUCKET" \
            --s3-prefix "candidates/${{ github.event.workflow_run.head_sha }}" \
            --role-arn "$AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides "${PARAMETERS[@]}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar
          stop_canary_probe
          trap - EXIT

      - name: Resolve public, non-secret stack outputs
        id: stack
        run: |
          set -euo pipefail
          OUTPUTS="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs' \
            --output json)"
          APPLICATION_URL="$(jq -er '.[] | select(.OutputKey == "ApplicationUrl") | .OutputValue' <<<"$OUTPUTS")"
          BUCKET_NAME="$(jq -er '.[] | select(.OutputKey == "SpaBucketName") | .OutputValue' <<<"$OUTPUTS")"
          DISTRIBUTION_ID="$(jq -er '.[] | select(.OutputKey == "DistributionId") | .OutputValue' <<<"$OUTPUTS")"
          {
            echo "application_url=$APPLICATION_URL"
            echo "bucket_name=$BUCKET_NAME"
            echo "distribution_id=$DISTRIBUTION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Publish the frontend and invalidate CloudFront
        id: frontend
        env:
          BUCKET_NAME: ${{ steps.stack.outputs.bucket_name }}
          DISTRIBUTION_ID: ${{ steps.stack.outputs.distribution_id }}
        run: |
          set -euo pipefail
          echo "started=true" >> "$GITHUB_OUTPUT"
          PREVIOUS_INDEX_VERSION="$(aws s3api head-object \
            --bucket "$BUCKET_NAME" \
            --key index.html \
            --region "$AWS_REGION" \
            --query VersionId \
            --output text 2>/dev/null || true)"
          echo "previous_index_version=$PREVIOUS_INDEX_VERSION" >> "$GITHUB_OUTPUT"
          # Hashed assets are retained so the previous index remains recoverable.
          # The new index is the atomic switch and is uploaded last.
          aws s3 sync web/dist "s3://$BUCKET_NAME" \
            --region "$AWS_REGION" \
            --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp web/dist/index.html "s3://$BUCKET_NAME/index.html" \
            --region "$AWS_REGION" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"
          INVALIDATION_ID="$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"

      - name: Smoke the same-origin application and real recall path
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/" |
            grep -q '<div id="root"></div>'
          HEALTH="$(curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/health")"
          jq -e '.ok == true and .status == "reachable"' <<<"$HEALTH"
          PROOF="$(curl --fail --silent --show-error \
            --retry 6 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/proof")"
          jq -e \
            --arg embed "$BEDROCK_EMBED_MODEL_ID" \
            --arg narrator "$BEDROCK_NARRATOR_MODEL_ID" \
            '.database.activeMemories > 0 and
             .vectorIndex.enabled == true and
             .vectorIndex.name == "idx_agent_memory_company_scope_embedding" and
             .vectorIndex.evidence == "live pg_catalog.pg_indexes definition" and
             (.vectorIndex.definitionFingerprint | test("^[a-f0-9]{64}$")) and
             .database.region == "eu-west-1" and
             .database.regionEvidence == "cockroach-cloud-api-release-gate" and
             (.database.runtimePrincipal | startswith("archon_staging_")) and
             .embeddingModel == $embed and
             .narrationModel == $narrator and
             .scope.mode == "fixed-synthetic-demo"' <<<"$PROOF"
          RECALL="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 --retry-all-errors \
            --max-time 45 \
            -X POST "$APPLICATION_URL/api/recall" \
            -H 'content-type: application/json' \
            --data '{"question":"What was the true employer cost and the off-bank wedge?","limit":5}')"
          jq -e \
            --arg narrator "$BEDROCK_NARRATOR_MODEL_ID" \
            '.recalled > 0 and
             (.citations | length) > 0 and
             (.answer | type == "string" and length > 0) and
             .modelId == $narrator and
             .grounding.status == "verified" and
             .grounding.checks.citations == true and
             .grounding.checks.numerics == true and
             .grounding.checks.claims == true and
             any(.citations[]; .content | contains("€15,375")) and
             any(.citations[]; .content | contains("€6,775"))' \
            <<<"$RECALL"
          AUDIT="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/audit")"
          jq -e \
            '.coverage.complete == true and
             .coverage.scanned == .coverage.total and
             .report.ok == false and
             any(.report.contradictions[];
               .subject == "INV-2043" and
               .attribute == "total" and
               .resolution.recommendedValue == 18400) and
             any(.report.absences[]; .subject == "PAY-118")' <<<"$AUDIT"

      - name: Hosted Chromium judge journey on staging
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.stack.outputs.application_url }}
          PLAYWRIGHT_LIVE: "1"
        run: |
          set -euo pipefail
          npm ci --prefix web
          npx --prefix web playwright install --with-deps chromium
          npm run test:e2e --prefix web

      - name: Restore the previous staging release on verification failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          BUCKET_NAME: ${{ steps.stack.outputs.bucket_name }}
          DISTRIBUTION_ID: ${{ steps.stack.outputs.distribution_id }}
          FRONTEND_STARTED: ${{ steps.frontend.outputs.started }}
          PREVIOUS_INDEX_VERSION: ${{ steps.frontend.outputs.previous_index_version }}
          PREVIOUS_FUNCTION_NAME: ${{ steps.previous.outputs.function_name }}
          PREVIOUS_FUNCTION_VERSION: ${{ steps.previous.outputs.function_version }}
        run: |
          set -u
          if [ -z "$BUCKET_NAME" ]; then
            BUCKET_NAME="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='SpaBucketName'].OutputValue | [0]" \
              --output text 2>/dev/null || true)"
          fi
          if [ -z "$DISTRIBUTION_ID" ]; then
            DISTRIBUTION_ID="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue | [0]" \
              --output text 2>/dev/null || true)"
          fi
          if [ "$FRONTEND_STARTED" = "true" ] &&
             [ -n "$BUCKET_NAME" ] &&
             [ -n "$PREVIOUS_INDEX_VERSION" ] &&
             [ "$PREVIOUS_INDEX_VERSION" != "None" ]; then
            aws s3api copy-object \
              --bucket "$BUCKET_NAME" \
              --key index.html \
              --copy-source "${BUCKET_NAME}/index.html?versionId=${PREVIOUS_INDEX_VERSION}" \
              --metadata-directive REPLACE \
              --content-type "text/html; charset=utf-8" \
              --cache-control "no-cache,no-store,must-revalidate" \
              --region "$AWS_REGION" >/dev/null
          elif [ "$FRONTEND_STARTED" = "true" ] && [ -n "$BUCKET_NAME" ]; then
            aws s3api delete-object \
              --bucket "$BUCKET_NAME" \
              --key index.html \
              --region "$AWS_REGION" >/dev/null
          fi
          if [ -n "$PREVIOUS_FUNCTION_NAME" ] &&
             [ -n "$PREVIOUS_FUNCTION_VERSION" ] &&
             [ "$PREVIOUS_FUNCTION_VERSION" != "None" ]; then
            aws lambda update-alias \
              --function-name "$PREVIOUS_FUNCTION_NAME" \
              --name live \
              --function-version "$PREVIOUS_FUNCTION_VERSION" \
              --region "$AWS_REGION" >/dev/null
          fi
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths '/*' >/dev/null
          fi

      - name: Publish sanitized staging deployment receipt
        if: success()
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          jq \
            --arg environment staging \
            --arg stackName "$STACK_NAME" \
            --arg applicationUrl "$APPLICATION_URL" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '. + {deployment: {
              environment: $environment,
              stackName: $stackName,
              applicationUrl: $applicationUrl,
              deployedAt: $deployedAt,
              smoke: "passed",
              canary: "Canary10Percent5Minutes"
            }}' deployment-receipt.json > staging-deployment-receipt.json

      - name: Upload staging receipt
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-deployment-receipt-${{ github.event.workflow_run.head_sha }}
          path: staging-deployment-receipt.json
          if-no-files-found: error
          retention-days: 30

  deploy-production:
    name: Promote identical candidate to production
    needs:
      - build-once
      - deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.stack.outputs.application_url }}
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 50
    env:
      STACK_NAME: ${{ vars.AWS_STACK_NAME || 'archon-memory-production' }}
      DATABASE_SECRET_ID: ${{ vars.DATABASE_SECRET_ID || 'archon-memory/production/database' }}
      ALARM_TOPIC_ARN: ${{ secrets.ALARM_TOPIC_ARN }}
      AWS_DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN: ${{ vars.AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN }}
      AWS_SAM_ARTIFACT_BUCKET: ${{ vars.AWS_SAM_ARTIFACT_BUCKET }}
      AWS_LAMBDA_EXECUTION_ROLE_ARN: ${{ vars.AWS_LAMBDA_EXECUTION_ROLE_ARN }}
      AWS_CODEDEPLOY_SERVICE_ROLE_ARN: ${{ vars.AWS_CODEDEPLOY_SERVICE_ROLE_ARN }}
    steps:
      - name: Check out the exact promoted source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Download the same CI-proven candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: aws-candidate-${{ github.event.workflow_run.head_sha }}

      - name: Verify candidate tree hashes and eu-west-1 boundary
        run: |
          set -euo pipefail
          test "$AWS_REGION" = "eu-west-1"
          test "$BEDROCK_REGION" = "eu-west-1"
          test -n "$AWS_ACCOUNT_ID"
          node aws/create-deployment-receipt.mjs \
            --verify deployment-receipt.json \
            --commit "${{ github.event.workflow_run.head_sha }}" \
            --sam .aws-sam/build \
            --web web/dist

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.164.0

      - name: Configure short-lived AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: archon-production-${{ github.run_id }}
          mask-aws-account-id: true
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Capture the current recoverable release
        id: previous
        run: |
          set -euo pipefail
          FUNCTION_NAME=""
          FUNCTION_VERSION=""
          APPLICATION_URL=""
          if aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            FUNCTION_NAME="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='FunctionName'].OutputValue | [0]" \
              --output text)"
            APPLICATION_URL="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='ApplicationUrl'].OutputValue | [0]" \
              --output text)"
            if [ -n "$FUNCTION_NAME" ] && [ "$FUNCTION_NAME" != "None" ]; then
              FUNCTION_VERSION="$(aws lambda get-alias \
                --function-name "$FUNCTION_NAME" \
                --name live \
                --region "$AWS_REGION" \
                --query FunctionVersion \
                --output text 2>/dev/null || true)"
            fi
          fi
          {
            echo "function_name=$FUNCTION_NAME"
            echo "function_version=$FUNCTION_VERSION"
            echo "application_url=$APPLICATION_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy production with SAM canary rollback
        id: deploy
        env:
          CANARY_URL: ${{ steps.previous.outputs.application_url }}
        run: |
          set -euo pipefail
          test -n "$DATABASE_SECRET_ID"
          test -n "$AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN"
          test -n "$AWS_SAM_ARTIFACT_BUCKET"
          test -n "$AWS_LAMBDA_EXECUTION_ROLE_ARN"
          test -n "$AWS_CODEDEPLOY_SERVICE_ROLE_ARN"
          PARAMETERS=(
            "AppName=$APP_NAME"
            "Environment=production"
            "DatabaseSecretId=$DATABASE_SECRET_ID"
            "LambdaExecutionRoleArn=$AWS_LAMBDA_EXECUTION_ROLE_ARN"
            "CodeDeployServiceRoleArn=$AWS_CODEDEPLOY_SERVICE_ROLE_ARN"
            "BedrockRegion=$BEDROCK_REGION"
            "BedrockEmbeddingModelId=$BEDROCK_EMBED_MODEL_ID"
            "BedrockNarratorModelId=$BEDROCK_NARRATOR_MODEL_ID"
            "CockroachRegion=eu-west-1"
            "CockroachRegionEvidence=cockroach-cloud-api-release-gate"
          )
          if [ -n "$ALARM_TOPIC_ARN" ]; then
            PARAMETERS+=("AlarmTopicArn=$ALARM_TOPIC_ARN")
          fi
          CANARY_PROBE_PID=""
          stop_canary_probe() {
            if [ -n "$CANARY_PROBE_PID" ]; then
              kill "$CANARY_PROBE_PID" 2>/dev/null || true
              wait "$CANARY_PROBE_PID" 2>/dev/null || true
            fi
          }
          trap stop_canary_probe EXIT
          if [ -n "$CANARY_URL" ] && [ "$CANARY_URL" != "None" ]; then
            (
              for attempt in $(seq 1 180); do
                curl --fail --silent --max-time 30 \
                  "$CANARY_URL/api/proof" >/dev/null 2>&1 || true
                if [ $((attempt % 5)) -eq 0 ]; then
                  curl --fail --silent --max-time 45 \
                    -X POST "$CANARY_URL/api/recall" \
                    -H 'content-type: application/json' \
                    --data '{"question":"What was the true employer cost and the off-bank wedge?","limit":5}' \
                    >/dev/null 2>&1 || true
                fi
                sleep 2
              done
            ) &
            CANARY_PROBE_PID=$!
          fi
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --s3-bucket "$AWS_SAM_ARTIFACT_BUCKET" \
            --s3-prefix "candidates/${{ github.event.workflow_run.head_sha }}" \
            --role-arn "$AWS_CLOUDFORMATION_EXECUTION_ROLE_ARN" \
            --parameter-overrides "${PARAMETERS[@]}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar
          stop_canary_probe
          trap - EXIT

      - name: Resolve public, non-secret stack outputs
        id: stack
        run: |
          set -euo pipefail
          OUTPUTS="$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs' \
            --output json)"
          APPLICATION_URL="$(jq -er '.[] | select(.OutputKey == "ApplicationUrl") | .OutputValue' <<<"$OUTPUTS")"
          BUCKET_NAME="$(jq -er '.[] | select(.OutputKey == "SpaBucketName") | .OutputValue' <<<"$OUTPUTS")"
          DISTRIBUTION_ID="$(jq -er '.[] | select(.OutputKey == "DistributionId") | .OutputValue' <<<"$OUTPUTS")"
          {
            echo "application_url=$APPLICATION_URL"
            echo "bucket_name=$BUCKET_NAME"
            echo "distribution_id=$DISTRIBUTION_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Publish the frontend and invalidate CloudFront
        id: frontend
        env:
          BUCKET_NAME: ${{ steps.stack.outputs.bucket_name }}
          DISTRIBUTION_ID: ${{ steps.stack.outputs.distribution_id }}
        run: |
          set -euo pipefail
          echo "started=true" >> "$GITHUB_OUTPUT"
          PREVIOUS_INDEX_VERSION="$(aws s3api head-object \
            --bucket "$BUCKET_NAME" \
            --key index.html \
            --region "$AWS_REGION" \
            --query VersionId \
            --output text 2>/dev/null || true)"
          echo "previous_index_version=$PREVIOUS_INDEX_VERSION" >> "$GITHUB_OUTPUT"
          aws s3 sync web/dist "s3://$BUCKET_NAME" \
            --region "$AWS_REGION" \
            --exclude index.html \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 cp web/dist/index.html "s3://$BUCKET_NAME/index.html" \
            --region "$AWS_REGION" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache,no-store,must-revalidate"
          INVALIDATION_ID="$(aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths '/*' \
            --query 'Invalidation.Id' \
            --output text)"
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DISTRIBUTION_ID" \
            --id "$INVALIDATION_ID"

      - name: Smoke production through CloudFront
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/" |
            grep -q '<div id="root"></div>'
          HEALTH="$(curl --fail --silent --show-error \
            --retry 12 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/health")"
          jq -e '.ok == true and .status == "reachable"' <<<"$HEALTH"
          PROOF="$(curl --fail --silent --show-error \
            --retry 6 --retry-delay 5 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/proof")"
          jq -e \
            --arg embed "$BEDROCK_EMBED_MODEL_ID" \
            --arg narrator "$BEDROCK_NARRATOR_MODEL_ID" \
            '.database.activeMemories > 0 and
             .vectorIndex.enabled == true and
             .vectorIndex.name == "idx_agent_memory_company_scope_embedding" and
             .vectorIndex.evidence == "live pg_catalog.pg_indexes definition" and
             (.vectorIndex.definitionFingerprint | test("^[a-f0-9]{64}$")) and
             .database.region == "eu-west-1" and
             .database.regionEvidence == "cockroach-cloud-api-release-gate" and
             (.database.runtimePrincipal | startswith("archon_production_")) and
             .embeddingModel == $embed and
             .narrationModel == $narrator and
             .scope.mode == "fixed-synthetic-demo"' <<<"$PROOF"
          RECALL="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 --retry-all-errors \
            --max-time 45 \
            -X POST "$APPLICATION_URL/api/recall" \
            -H 'content-type: application/json' \
            --data '{"question":"What was the true employer cost and the off-bank wedge?","limit":5}')"
          jq -e \
            --arg narrator "$BEDROCK_NARRATOR_MODEL_ID" \
            '.recalled > 0 and
             (.citations | length) > 0 and
             (.answer | type == "string" and length > 0) and
             .modelId == $narrator and
             .grounding.status == "verified" and
             .grounding.checks.citations == true and
             .grounding.checks.numerics == true and
             .grounding.checks.claims == true and
             any(.citations[]; .content | contains("€15,375")) and
             any(.citations[]; .content | contains("€6,775"))' \
            <<<"$RECALL"
          AUDIT="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 3 --retry-all-errors \
            --max-time 30 "$APPLICATION_URL/api/audit")"
          jq -e \
            '.coverage.complete == true and
             .coverage.scanned == .coverage.total and
             .report.ok == false and
             any(.report.contradictions[];
               .subject == "INV-2043" and
               .attribute == "total" and
               .resolution.recommendedValue == 18400) and
             any(.report.absences[]; .subject == "PAY-118")' <<<"$AUDIT"

      - name: Hosted Chromium judge journey on production
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.stack.outputs.application_url }}
          PLAYWRIGHT_LIVE: "1"
        run: |
          set -euo pipefail
          npm ci --prefix web
          npx --prefix web playwright install --with-deps chromium
          npm run test:e2e --prefix web

      - name: Restore the previous production release on verification failure
        if: failure() && steps.deploy.outcome == 'success'
        env:
          BUCKET_NAME: ${{ steps.stack.outputs.bucket_name }}
          DISTRIBUTION_ID: ${{ steps.stack.outputs.distribution_id }}
          FRONTEND_STARTED: ${{ steps.frontend.outputs.started }}
          PREVIOUS_INDEX_VERSION: ${{ steps.frontend.outputs.previous_index_version }}
          PREVIOUS_FUNCTION_NAME: ${{ steps.previous.outputs.function_name }}
          PREVIOUS_FUNCTION_VERSION: ${{ steps.previous.outputs.function_version }}
        run: |
          set -u
          if [ -z "$BUCKET_NAME" ]; then
            BUCKET_NAME="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='SpaBucketName'].OutputValue | [0]" \
              --output text 2>/dev/null || true)"
          fi
          if [ -z "$DISTRIBUTION_ID" ]; then
            DISTRIBUTION_ID="$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" --region "$AWS_REGION" \
              --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue | [0]" \
              --output text 2>/dev/null || true)"
          fi
          if [ "$FRONTEND_STARTED" = "true" ] &&
             [ -n "$BUCKET_NAME" ] &&
             [ -n "$PREVIOUS_INDEX_VERSION" ] &&
             [ "$PREVIOUS_INDEX_VERSION" != "None" ]; then
            aws s3api copy-object \
              --bucket "$BUCKET_NAME" \
              --key index.html \
              --copy-source "${BUCKET_NAME}/index.html?versionId=${PREVIOUS_INDEX_VERSION}" \
              --metadata-directive REPLACE \
              --content-type "text/html; charset=utf-8" \
              --cache-control "no-cache,no-store,must-revalidate" \
              --region "$AWS_REGION" >/dev/null
          elif [ "$FRONTEND_STARTED" = "true" ] && [ -n "$BUCKET_NAME" ]; then
            aws s3api delete-object \
              --bucket "$BUCKET_NAME" \
              --key index.html \
              --region "$AWS_REGION" >/dev/null
          fi
          if [ -n "$PREVIOUS_FUNCTION_NAME" ] &&
             [ -n "$PREVIOUS_FUNCTION_VERSION" ] &&
             [ "$PREVIOUS_FUNCTION_VERSION" != "None" ]; then
            aws lambda update-alias \
              --function-name "$PREVIOUS_FUNCTION_NAME" \
              --name live \
              --function-version "$PREVIOUS_FUNCTION_VERSION" \
              --region "$AWS_REGION" >/dev/null
          fi
          if [ -n "$DISTRIBUTION_ID" ] && [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DISTRIBUTION_ID" \
              --paths '/*' >/dev/null
          fi

      - name: Publish sanitized production deployment receipt
        if: success()
        env:
          APPLICATION_URL: ${{ steps.stack.outputs.application_url }}
        run: |
          jq \
            --arg environment production \
            --arg stackName "$STACK_NAME" \
            --arg applicationUrl "$APPLICATION_URL" \
            --arg deployedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '. + {deployment: {
              environment: $environment,
              stackName: $stackName,
              applicationUrl: $applicationUrl,
              deployedAt: $deployedAt,
              smoke: "passed",
              canary: "Canary10Percent5Minutes"
            }}' deployment-receipt.json > production-deployment-receipt.json

      - name: Upload production receipt
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-deployment-receipt-${{ github.event.workflow_run.head_sha }}
          path: production-deployment-receipt.json
          if-no-files-found: error
          retention-days: 90

  managed-mcp-production-audit:
    name: Prove production memory through CockroachDB Managed MCP
    needs:
      - deploy-production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production-audit
    permissions:
      contents: read
    env:
      CCLOUD_API_KEY: ${{ secrets.CCLOUD_API_KEY }}
      COCKROACH_CLUSTER_ID: ${{ vars.COCKROACH_CLUSTER_ID }}
      COCKROACH_DATABASE: ${{ vars.COCKROACH_DATABASE || 'archon' }}
    steps:
      - name: Check out the exact deployed source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run bounded read-only Managed MCP proof
        run: |
          set -euo pipefail
          test -n "$CCLOUD_API_KEY"
          test -n "$COCKROACH_CLUSTER_ID"
          npm run --silent mcp:cloud:audit | tee managed-mcp-production-receipt.json
          jq -e \
            '.ok == true and
             .mode == "read-only" and
             (.proofs | length) >= 4 and
             (.redactions | index("API key")) != null' \
            managed-mcp-production-receipt.json
      - name: Upload sanitized Managed MCP receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: managed-mcp-production-${{ github.event.workflow_run.head_sha }}
          path: managed-mcp-production-receipt.json
          if-no-files-found: error
          retention-days: 90
