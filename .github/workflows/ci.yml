name: CI

# Archon Memory CI — mirrors the Archon convention (ADR-001 PR gate, ADR-005 gitleaks-first).
# The pipeline stands up CockroachDB + runs the schema, unit tests, and a real
# vector-recall smoke IN CI (the runner does the docker, never a dev laptop).
# Runs fully offline: no AWS creds → the embedder auto-falls back to FakeEmbedder
# (src/memory/embeddings.ts), so the vector index is exercised end-to-end with no secrets.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1 — fail fast on any committed secret (ADR-005).
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: gitleaks detect (verified v8.30.1, redacted)
        run: |
          set -euo pipefail
          curl -sSLo /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz" |
            sha256sum --check
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --redact --no-banner

  # Stage 2a — dependency vulnerability audit (offline; runs in parallel with tests).
  # --audit-level=high: low/moderate advisories are reported but do not fail the
  # build (kept non-blocking to avoid transient-advisory noise); a high or critical
  # vulnerability fails the job so it is surfaced, never silently suppressed.
  dep-audit:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  build-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://root@localhost:26257/archon_memory?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Start CockroachDB (v25.2+ for native vector indexing)
        run: |
          docker run -d --name crdb -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:v26.2.3@sha256:1073844226a6291b8a44fcb9cab5cb02035bb8fea3266dcc5dd021c0b34484a0 start-single-node --insecure
          echo "Waiting for CockroachDB to accept SQL..."
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              echo "ready"; break
            fi
            sleep 2
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_memory"
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_migration"
          # Fail loudly if it never came up.
          docker exec crdb cockroach sql --insecure -e "SELECT 1"

      - name: Rehearse legacy migration, drift failure, and idempotent re-apply
        env:
          DATABASE_URL: postgresql://root@localhost:26257/archon_migration?sslmode=disable
        run: npm run db:migration:rehearsal

      - name: Apply schema (creates the VECTOR(1024) memory table + vector index)
        run: npm run db:schema

      # Unit + integration tests, INCLUDING the multi-range vector fan-out test
      # (tests/fanout.test.ts): against the real CockroachDB in CI it forces the memory
      # table into >=2 KV ranges with enforced primary-key `SPLIT AT` (deterministic,
      # size-independent — not a natural size-driven auto-split), then proves one ANN
      # recall query fans out across those ranges and returns the correct top-k. Turns
      # docs/BENCHMARK.md Result 3b from asserted into tested. Offline it runs recall
      # correctness under the mock and skips the range assertions.
      - name: Unit + integration tests (incl. multi-range fan-out)
        run: npm test

      - name: Vector-recall smoke (offline FakeEmbedder — no AWS creds)
        run: npm run memory:demo

      # Fast benchmark smoke — proves the recall@k harness runs end-to-end and the
      # distributed vector index tracks exact NN above a floor (fails loudly if the
      # index silently degrades). The FULL benchmark + 3-node distribution capture
      # run in benchmark.yml (workflow_dispatch); numbers are committed to docs/BENCHMARK.md.
      - name: Vector-index benchmark smoke (offline, recall floor)
        run: BENCH_N=1500 BENCH_QUERIES=50 BENCH_K=10 BENCH_BATCH=500 BENCH_RECALL_FLOOR=0.80 npm run benchmark

      - name: Dump CockroachDB logs on failure
        if: failure()
        run: docker logs crdb || true

  # Stage 2c — node-loss survival, DEMONSTRATED in CI (not just asserted).
  # Stands up the real 3-node cluster (docker-compose.cluster.yml), applies the
  # schema, loads a small corpus, then runs show-distribution.sh in STRICT mode:
  # it kills roach3 (docker stop) and asserts recall STILL serves through roach1
  # (RF=3 quorum). STRICT=1 makes the script exit non-zero if recall stops serving,
  # so a regression that breaks node-loss survival FAILS this job. This is what makes
  # the README "kill any one node → recall keeps serving" claim CI-proven.
  cluster-survival:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: postgresql://root@localhost:26257/archon_memory?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Start the 3-node CockroachDB cluster (RF=3 across roach1/2/3)
        run: |
          set -euo pipefail
          COMPOSE="docker compose -f docker-compose.cluster.yml"
          $COMPOSE up -d
          echo "Waiting for the roach1 process to accept exec…"
          for i in $(seq 1 20); do
            if $COMPOSE exec -T roach1 cockroach node status --insecure >/dev/null 2>&1; then break; fi
            # `node status` errors until init, but a non-"cannot exec" error means the process is up.
            if $COMPOSE exec -T roach1 true >/dev/null 2>&1; then break; fi
            sleep 3
          done
          echo "Initializing the cluster (retry until it takes)…"
          READY=0
          for i in $(seq 1 30); do
            $COMPOSE exec -T roach1 cockroach init --insecure >/dev/null 2>&1 || true
            if $COMPOSE exec -T roach1 cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              READY=1; echo "cluster ready after ${i} attempt(s)"; break
            fi
            sleep 3
          done
          if [ "$READY" -ne 1 ]; then echo "cluster never became ready"; $COMPOSE logs || true; exit 1; fi
          $COMPOSE exec -T roach1 cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_memory"
          $COMPOSE exec -T roach1 cockroach sql --insecure -e "SELECT 1"

      - name: Apply schema to the cluster (VECTOR table + vector index)
        run: npm run db:schema

      - name: Node-kill survival — STRICT (fails the build if recall stops serving)
        run: STRICT=1 DIST_N=800 bash scripts/show-distribution.sh

      - name: Dump cluster logs on failure
        if: failure()
        run: docker compose -f docker-compose.cluster.yml logs || true

  # Stage 2d — PEN-TEST. Stands up its OWN CockroachDB and runs the application-security
  # suite (tests/security.test.ts) with DATABASE_URL set, so the injection /
  # parameterized-query assertions execute against a REAL engine (the in-memory mock
  # cannot prove SQL parameterization). Covers AuthZ (MCP write/read tool boundary),
  # injection, tenant/scope isolation, sensitive-data exposure, and input-abuse bounds.
  pen-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://root@localhost:26257/archon_memory?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Start CockroachDB (v25.2+ native vector indexing)
        run: |
          docker run -d --name crdb -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:v26.2.3@sha256:1073844226a6291b8a44fcb9cab5cb02035bb8fea3266dcc5dd021c0b34484a0 start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then echo ready; break; fi
            sleep 2
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_memory"
          docker exec crdb cockroach sql --insecure -e "SELECT 1"
      - name: Apply schema
        run: npm run db:schema
      - name: Application-security suite (real-CRDB parameterization proof)
        run: npm run test:security
      - name: Prove role-bound RLS ignores mutable application_name
        run: |
          set -euo pipefail
          docker exec crdb cockroach sql --insecure --database archon_memory --execute "
            CREATE USER IF NOT EXISTS archon_runtime_ci;
            GRANT archon_public_reader TO archon_runtime_ci;
            UPDATE agent_memory
               SET tenant_id = 'public-demo', company = 'Helios SA', status = 'active'
             WHERE id = (SELECT id FROM agent_memory LIMIT 1);
          "
          RESULT="$(docker exec crdb cockroach sql \
            --insecure \
            --database archon_memory \
            --format=csv \
            --execute "
              SET ROLE archon_runtime_ci;
              SET application_name = 'archon.attacker-selected-tenant';
              SELECT count(*) AS visible,
                     count(*) FILTER (
                       WHERE tenant_id = 'public-demo'
                         AND company = 'Helios SA'
                         AND status = 'active'
                     ) AS correctly_scoped
                FROM agent_memory;
            " | tail -n 1)"
          VISIBLE="${RESULT%%,*}"
          SCOPED="${RESULT##*,}"
          test "$VISIBLE" -ge 1
          test "$VISIBLE" = "$SCOPED"
      - name: Dump CockroachDB logs on failure
        if: failure()
        run: docker logs crdb || true

  # Stage 2e — LOAD. Drives the recall / vector-search path under concurrency with k6
  # against a real CockroachDB (offline of AWS → FakeEmbedder/FakeNarrator, same recall
  # path). k6 thresholds enforce the p95 latency SLO + recall@1 correctness; a regression
  # that breaches either FAILS this job. Bounded (20 VUs, 20s).
  load:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://root@localhost:26257/archon_memory?sslmode=disable
      LOAD_N: "2000"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Install k6 (SHA-pinned action and version)
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
        with:
          k6-version: "2.0.0"
      - name: Start CockroachDB
        run: |
          docker run -d --name crdb -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:v26.2.3@sha256:1073844226a6291b8a44fcb9cab5cb02035bb8fea3266dcc5dd021c0b34484a0 start-single-node --insecure
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then echo ready; break; fi
            sleep 2
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_memory"
      - name: Apply schema
        run: npm run db:schema
      - name: Seed the load corpus
        run: npm run load:seed
      - name: Start the recall server
        run: |
          PORT=8787 npm run serve &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8787/health >/dev/null 2>&1; then echo "server up"; break; fi
            sleep 1
          done
      - name: k6 load test (p95 SLO + recall@1 under concurrency)
        run: k6 run -e BASE_URL=http://localhost:8787 -e LOAD_N=2000 load/recall.js
      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true
      - name: Dump CockroachDB logs on failure
        if: failure()
        run: docker logs crdb || true

  # Stage 2f — the judge-facing React app, browser journeys, and deployable SAM
  # architecture are first-class release gates. All build/browser artifacts live
  # only on the ephemeral CI runner.
  frontend-iac:
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@89ddb14d60e682855e3fea4be85b3c56485de310 # v3
        with:
          version: 1.164.0
      - name: Install pinned CloudFormation linter
        run: python -m pip install --disable-pip-version-check cfn-lint==1.53.1
      - name: Install locked backend and frontend dependencies
        run: |
          npm ci
          npm ci --prefix web
      - name: Dependency audit
        run: |
          npm audit --audit-level=high
          npm audit --prefix web --audit-level=high
      - name: Backend and frontend type/unit/build gates
        run: |
          npm run typecheck
          npm run typecheck --prefix web
          npm test --prefix web
          npm run build --prefix web
      - name: Validate and build the serverless architecture
        run: |
          cfn-lint aws/bootstrap-oidc.yaml
          sam validate --lint --template-file aws/template.yaml --region eu-west-1
          PATH="$PWD/node_modules/.bin:$PATH" sam build \
            --template-file aws/template.yaml \
            --build-dir .aws-sam/build \
            --parallel
          if grep -q "Type: AWS::IAM::" .aws-sam/build/template.yaml; then
            echo "Application stack must not synthesize IAM resources." >&2
            exit 1
          fi
      - name: Install Chromium in the ephemeral runner
        run: npx --prefix web playwright install --with-deps chromium
      - name: Desktop and mobile judge journeys
        run: npm run test:e2e --prefix web
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-ci-${{ github.sha }}
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
          retention-days: 14

  # Stage 3 — the READINESS GATE. Runs ONLY after the offline suite (build-test), the
  # node-kill survival job (cluster-survival), the pen-test job, and the load job are
  # green, so its checks reflect real CI state, not just committed files.
  # Fails unless every repository-verifiable source check passes. Submission-only
  # requirements remain visibly pending and cannot masquerade as eligibility.
  readiness:
    needs: [dep-audit, build-test, cluster-survival, pen-test, load, frontend-iac]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Source readiness gate (100% repository-verifiable checks)
        env:
          READINESS_OUTPUT: readiness.json
          SOURCE_READINESS_FLOOR: "100"
        run: npm run readiness
      - name: Upload readiness report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readiness-report
          path: readiness.json
