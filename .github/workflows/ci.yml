name: CI

# Archon Memory CI — mirrors the Archon convention (ADR-001 PR gate, ADR-005 gitleaks-first).
# The pipeline stands up CockroachDB + runs the schema, unit tests, and a real
# vector-recall smoke IN CI (the runner does the docker, never a dev laptop).
# Runs fully offline: no AWS creds → the embedder auto-falls back to FakeEmbedder
# (src/memory/embeddings.ts), so the vector index is exercised end-to-end with no secrets.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Stage 1 — fail fast on any committed secret (ADR-005).
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks detect (pinned v8.18.4, redacted)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner

  # Stage 2a — dependency vulnerability audit (offline; runs in parallel with tests).
  # --audit-level=high: low/moderate advisories are reported but do not fail the
  # build (kept non-blocking to avoid transient-advisory noise); a high or critical
  # vulnerability fails the job so it is surfaced, never silently suppressed.
  dep-audit:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install deps
        run: npm ci
      - name: npm audit (fail on high/critical)
        run: npm audit --audit-level=high

  build-test:
    needs: secret-scan
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://root@localhost:26257/archon_memory?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Start CockroachDB (v25.2+ for native vector indexing)
        run: |
          docker run -d --name crdb -p 26257:26257 -p 8080:8080 \
            cockroachdb/cockroach:latest start-single-node --insecure
          echo "Waiting for CockroachDB to accept SQL..."
          for i in $(seq 1 30); do
            if docker exec crdb cockroach sql --insecure -e "SELECT 1" >/dev/null 2>&1; then
              echo "ready"; break
            fi
            sleep 2
          done
          docker exec crdb cockroach sql --insecure -e "CREATE DATABASE IF NOT EXISTS archon_memory"
          # Fail loudly if it never came up.
          docker exec crdb cockroach sql --insecure -e "SELECT 1"

      - name: Apply schema (creates the VECTOR(1024) memory table + vector index)
        run: npm run db:schema

      # Unit + integration tests, INCLUDING the multi-range vector fan-out test
      # (tests/fanout.test.ts): against the real CockroachDB in CI it loads a corpus large
      # enough that the native vector index auto-splits into >=2 KV ranges, then proves one
      # ANN recall query fans out across those ranges and returns the correct top-k. Turns
      # docs/BENCHMARK.md Result 3 from asserted into tested. Offline it runs recall
      # correctness under the mock and skips the range assertions.
      - name: Unit + integration tests (incl. multi-range fan-out)
        run: npm test

      - name: Vector-recall smoke (offline FakeEmbedder — no AWS creds)
        run: npm run memory:demo

      # Fast benchmark smoke — proves the recall@k harness runs end-to-end and the
      # distributed vector index tracks exact NN above a floor (fails loudly if the
      # index silently degrades). The FULL benchmark + 3-node distribution capture
      # run in benchmark.yml (workflow_dispatch); numbers are committed to docs/BENCHMARK.md.
      - name: Vector-index benchmark smoke (offline, recall floor)
        run: BENCH_N=1500 BENCH_QUERIES=50 BENCH_K=10 BENCH_BATCH=500 BENCH_RECALL_FLOOR=0.80 npm run benchmark

      - name: Dump CockroachDB logs on failure
        if: failure()
        run: docker logs crdb || true
