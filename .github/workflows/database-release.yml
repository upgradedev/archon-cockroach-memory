name: Database release

on:
  workflow_call:
    inputs:
      target_sha:
        description: Exact green main commit to reconcile
        required: true
        type: string
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact current main SHA (defaults to the selected ref)
        required: false
        type: string

concurrency:
  group: cockroach-production-database
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    name: Atomic schema, canonical seed, and runtime RLS proof
    if: github.event_name == 'workflow_call' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production-db
    permissions:
      contents: read
      id-token: write
    env:
      APP_NAME: ${{ vars.AWS_APP_NAME || 'archon-memory' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      AWS_DATABASE_OPERATOR_ROLE_ARN: ${{ vars.AWS_DATABASE_OPERATOR_ROLE_ARN }}
      CCLOUD_API_KEY: ${{ secrets.CCLOUD_API_KEY }}
      COCKROACH_CLUSTER_ID: ${{ vars.COCKROACH_CLUSTER_ID }}
      COCKROACH_ADMIN_SECRET_ID: ${{ vars.COCKROACH_ADMIN_SECRET_ID || 'archon-memory/operator/cockroach-admin' }}
      STAGING_DATABASE_SECRET_ID: ${{ vars.STAGING_DATABASE_SECRET_ID || 'archon-memory/staging/database' }}
      PRODUCTION_DATABASE_SECRET_ID: ${{ vars.PRODUCTION_DATABASE_SECRET_ID || 'archon-memory/production/database' }}
      BEDROCK_REGION: eu-west-1
      BEDROCK_EMBED_MODEL_ID: amazon.titan-embed-text-v2:0
      TARGET_SHA: ${{ inputs.target_sha || github.sha }}
    steps:
      - name: Check out the exact release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 1

      - name: Prove target is still current main
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin main
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          test "$(git rev-parse origin/main)" = "$TARGET_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate protected environment configuration
        run: |
          set -euo pipefail
          test -n "$AWS_ACCOUNT_ID"
          test -n "$AWS_DATABASE_OPERATOR_ROLE_ARN"
          test -n "$CCLOUD_API_KEY"
          test -n "$COCKROACH_CLUSTER_ID"
          test "$AWS_REGION" = "eu-west-1"

      - name: Prove CockroachDB Cloud provider, plan, state, and region
        run: |
          set -euo pipefail
          CLUSTER_METADATA="$(curl --fail --silent --show-error \
            --retry 3 --retry-delay 2 --retry-all-errors \
            --max-time 30 \
            "https://cockroachlabs.cloud/api/v1/clusters/$COCKROACH_CLUSTER_ID" \
            -H "Authorization: Bearer $CCLOUD_API_KEY" \
            -H "Cc-Version: 2024-09-16")"
          jq -e \
            --arg id "$COCKROACH_CLUSTER_ID" \
            '.id == $id and
             .cloud_provider == "AWS" and
             .plan == "BASIC" and
             .state == "CREATED" and
             (.cockroach_version | startswith("v26.")) and
             any(.regions[];
               .name == "eu-west-1" and .primary == true)' \
            <<<"$CLUSTER_METADATA"
          {
            echo "COCKROACH_CLOUD_PROVIDER=AWS"
            echo "COCKROACH_CLOUD_PLAN=BASIC"
            echo "COCKROACH_CLOUD_REGION=eu-west-1"
            echo "COCKROACH_CLOUD_VERSION=$(jq -er '.cockroach_version' <<<"$CLUSTER_METADATA")"
          } >> "$GITHUB_ENV"
          unset CLUSTER_METADATA

      - name: Configure short-lived database-operator credentials
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          role-to-assume: ${{ env.AWS_DATABASE_OPERATOR_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: archon-database-${{ github.run_id }}
          mask-aws-account-id: true
          allowed-account-ids: ${{ env.AWS_ACCOUNT_ID }}

      - name: Gate real Titan and Claude quality on the golden judge question
        env:
          RUN_BEDROCK_IT: "1"
          BEDROCK_MODEL_ID: eu.anthropic.claude-sonnet-4-6
        run: npm run test:bedrock

      - name: Reconcile schema, canonical memory, and runtime credentials
        run: |
          set -euo pipefail
          test -n "$AWS_ACCOUNT_ID"
          test "$AWS_REGION" = "eu-west-1"
          test "$BEDROCK_REGION" = "eu-west-1"
          test -n "$AWS_DATABASE_OPERATOR_ROLE_ARN"
          ACTUAL_ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          test "$ACTUAL_ACCOUNT" = "$AWS_ACCOUNT_ID"

          ADMIN_SECRET="$(aws secretsmanager get-secret-value \
            --secret-id "$COCKROACH_ADMIN_SECRET_ID" \
            --region "$AWS_REGION" \
            --query SecretString \
            --output text)"
          if [[ "$ADMIN_SECRET" == postgres://* || "$ADMIN_SECRET" == postgresql://* ]]; then
            DATABASE_URL="$ADMIN_SECRET"
          else
            DATABASE_URL="$(jq -er '.DATABASE_URL' <<<"$ADMIN_SECRET")"
          fi
          echo "::add-mask::$DATABASE_URL"
          export DATABASE_URL

          npm run db:schema
          npm run demo:seed

          if ! aws secretsmanager describe-secret \
            --secret-id "$STAGING_DATABASE_SECRET_ID" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            APP_ENV=staging \
            APP_DB_USER="archon_staging_${TARGET_SHA:0:10}" \
            DATABASE_SECRET_NAME="$STAGING_DATABASE_SECRET_ID" \
            npm run aws:provision-secret
          fi
          if ! aws secretsmanager describe-secret \
            --secret-id "$PRODUCTION_DATABASE_SECRET_ID" \
            --region "$AWS_REGION" >/dev/null 2>&1; then
            APP_ENV=production \
            APP_DB_USER="archon_production_${TARGET_SHA:0:10}" \
            DATABASE_SECRET_NAME="$PRODUCTION_DATABASE_SECRET_ID" \
            npm run aws:provision-secret
          fi

          npm run --silent db:release:verify > database-release-receipt.json
          jq -e \
            --arg target "$TARGET_SHA" \
            '.schemaVersion == 2 and
             .ok == true and
             .targetSha == $target and
             .region == "eu-west-1" and
             .cockroachCloud.provider == "AWS" and
             .cockroachCloud.region == "eu-west-1" and
             .fixtureRows == 12 and
             .proofs.roleBoundRls == true and
             .proofs.wrongCompanyInvisible == true and
             .proofs.wrongTenantInvisible == true and
             .proofs.retractedStatusInvisible == true and
             .proofs.productionShapedVectorSearchPlan == true and
             (.releaseDigests.schemaSha256 | test("^[a-f0-9]{64}$")) and
             (.releaseDigests.fixtureManifestSha256 | test("^[a-f0-9]{64}$")) and
             .secretMaterialPrinted == false and
             (.runtimes | length) == 2' \
            database-release-receipt.json
          unset ADMIN_SECRET DATABASE_URL

      - name: Upload sanitized database release receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: database-release-${{ env.TARGET_SHA }}
          path: database-release-receipt.json
          if-no-files-found: error
          retention-days: 90
